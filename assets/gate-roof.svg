  <path d="M33 55 v2.2" stroke-width="1.5"/>
  <!-- lanterne suspendue droite -->
  <path d="M267 41 v2.5" stroke-width="1.5"/>
  <path d="M261.5 43.5 h11" stroke-width="1.5"/>
  <rect x="262.5" y="44" width="9" height="11" rx="2.5" stroke-width="1.5"/>
  <path d="M262.5 47.7 h9 M262.5 51.3 h9" stroke-width="1" opacity="0.7"/>
  <path d="M267 55 v2.2" stroke-width="1.5"/>
</svg>
